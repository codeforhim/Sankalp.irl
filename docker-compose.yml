
services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./Backend:/app
      - /app/node_modules
      - ./Feature2:/app/Feature2
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    env_file:
      - ./Backend/.env
    command: >
      sh -c "
      node scripts/update_schema.js || true &&
      node scripts/backfill_priorities.js || true &&
      node scripts/002_add_user_location.js || true &&
      npx nodemon -L server.js
      "
    depends_on:
      - unified-ai

  unified-ai:
    build:
      context: ./Unified-AI
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./Unified-AI:/app
    env_file:
      - ./Backend/.env

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_USE_POLLING=true
    depends_on:
      - backend

networks:
  default:
    name: sankalp_network
