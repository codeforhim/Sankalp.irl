services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./Backend:/app
      - backend_node_modules:/app/node_modules
      - ./Feature2:/app/Feature2
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - SUPABASE_URL=https://xquxcptcglzuwwnxfvho.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxdXhjcHRjZ2x6dXd3bnhmdmhvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzQ4MTQ4NywiZXhwIjoyMDg5MDU3NDg3fQ.BAqSMYJjgFvJukEAbzUdH0S82Jb9Iy3YP5HO139Knlg
      - SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxdXhjcHRjZ2x6dXd3bnhmdmhvIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzQ4MTQ4NywiZXhwIjoyMDg5MDU3NDg3fQ.BAqSMYJjgFvJukEAbzUdH0S82Jb9Iy3YP5HO139Knlg
      - AI_SERVICE_URL=http://unified-ai:8000
      - COMMUNICATION_AI_URL=http://unified-ai:8000
      - ML_VISION_URL=http://unified-ai:8000
    env_file:
      - ./Backend/.env
    command: >
      sh -c " node scripts/update_schema.js || true && node scripts/backfill_priorities.js || true && node scripts/002_add_user_location.js || true && npx nodemon -L server.js "
    depends_on:
      - unified-ai

  unified-ai:
    build:
      context: ./Unified-AI
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    volumes:
      - ./Unified-AI:/app
    env_file:
      - ./Backend/.env

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_USE_POLLING=true
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  backend_node_modules:


networks:
  default:
    name: sankalp_network
